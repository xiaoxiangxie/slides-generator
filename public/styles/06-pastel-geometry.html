<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style 06: Pastel Geometry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* === MANDATORY VIEWPORT BASE === */
html, body { height: 100%; overflow-x: hidden; }
html { scroll-snap-type: y mandatory; scroll-behavior: smooth; }
.slide {
    width: 100vw; height: 100vh; height: 100dvh;
    overflow: hidden; scroll-snap-align: start;
    display: flex; flex-direction: column; position: relative;
}
:root {
    --title-size: clamp(1.5rem, 5vw, 4rem);
    --body-size: clamp(0.75rem, 1.5vw, 1.125rem);
    --small-size: clamp(0.65rem, 1vw, 0.875rem);
    --slide-padding: clamp(1rem, 4vw, 4rem);
    --content-gap: clamp(0.5rem, 2vw, 2rem);
    --element-gap: clamp(0.25rem, 1vw, 1rem);
}
@media (max-height: 700px) { :root { --slide-padding: clamp(0.75rem, 3vw, 2rem); --title-size: clamp(1.25rem, 4.5vw, 2.5rem); } }
@media (max-height: 600px) { :root { --slide-padding: clamp(0.5rem, 2.5vw, 1.5rem); --title-size: clamp(1.1rem, 4vw, 2rem); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.2s !important; } }

/* === PASTEL GEOMETRY THEME === */
:root {
    --bg-primary: #c8d9e6;
    --card-bg: #faf9f7;
    --pill-pink: #f0b4d4;
    --pill-mint: #a8d4c4;
    --pill-sage: #5a7c6a;
    --pill-lavender: #9b8dc4;
    --pill-violet: #7c6aad;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-primary); }

/* Outer card */
.card {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(88vw, 850px);
    background: var(--card-bg);
    border-radius: clamp(12px, 2vw, 20px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.06);
    padding: clamp(2rem, 5vw, 4rem);
    display: flex;
    gap: clamp(2rem, 5vw, 4rem);
    align-items: center;
    opacity: 0;
    animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
}
@keyframes cardIn { to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }

/* Left content */
.content-left {
    flex: 1;
}
.badge-row {
    display: flex;
    gap: 6px;
    margin-bottom: var(--content-gap);
    opacity: 0;
    animation: fadeUp 0.6s ease 0.3s forwards;
}
.badge {
    font-size: clamp(0.5rem, 0.9vw, 0.7rem);
    font-weight: 700;
    padding: 0.25em 0.6em;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
}
.badge-pink { background: var(--pill-pink); color: #7a3a5a; }
.badge-mint { background: var(--pill-mint); color: #3a6a5a; }
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

h1 {
    font-size: var(--title-size);
    font-weight: 800;
    color: #1a1a1a;
    line-height: 1.05;
    margin-bottom: var(--element-gap);
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.7s ease 0.4s forwards;
}
.subtitle {
    font-size: var(--body-size);
    color: #666;
    line-height: 1.6;
    max-width: 40ch;
    opacity: 0;
    transform: translateY(15px);
    animation: fadeUp 0.7s ease 0.5s forwards;
}

/* Vertical pills on right */
.pills {
    display: flex;
    flex-direction: column;
    gap: clamp(4px, 0.8vh, 8px);
    justify-content: center;
    height: 100%;
    opacity: 0;
    animation: fadeIn 0.6s ease 0.6s forwards;
}
@keyframes fadeIn { to { opacity: 1; } }
.pill {
    width: clamp(20px, 3vw, 32px);
    border-radius: 4px;
    opacity: 0.9;
}
.pill:nth-child(1) { height: clamp(40px, 7vh, 65px); background: var(--pill-pink); }
.pill:nth-child(2) { height: clamp(60px, 11vh, 100px); background: var(--pill-mint); }
.pill:nth-child(3) { height: clamp(30px, 5vh, 48px); background: var(--pill-sage); }
.pill:nth-child(4) { height: clamp(55px, 9vh, 80px); background: var(--pill-lavender); }
.pill:nth-child(5) { height: clamp(45px, 8vh, 72px); background: var(--pill-violet); }

/* Bottom decorative */
.bottom-deco {
    position: absolute;
    bottom: clamp(1rem, 3vw, 2rem);
    right: clamp(1.5rem, 4vw, 3rem);
    font-size: var(--small-size);
    color: rgba(0,0,0,0.25);
    font-weight: 500;
    letter-spacing: 0.05em;
}
</style>
</head>
<body>

<div class="slide">
    <div class="card">
        <div class="content-left">
            <div class="badge-row">
                <span class="badge badge-pink">S01</span>
                <span class="badge badge-mint">核心闭环</span>
            </div>
            <h1>Agent Loop</h1>
            <p class="subtitle">把"模型 + 工具"连接成一个能持续推进任务的主循环 · 130 LOC · 最小闭环</p>
        </div>
        <div class="pills">
            <div class="pill"></div>
            <div class="pill"></div>
            <div class="pill"></div>
            <div class="pill"></div>
            <div class="pill"></div>
        </div>
    </div>
    <div class="bottom-deco">learn.shareai.run</div>
</div>

</body>
</html>
