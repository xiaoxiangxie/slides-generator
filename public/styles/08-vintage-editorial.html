<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style 08: Vintage Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Work+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
/* === MANDATORY VIEWPORT BASE === */
html, body { height: 100%; overflow-x: hidden; }
html { scroll-snap-type: y mandatory; scroll-behavior: smooth; }
.slide {
    width: 100vw; height: 100vh; height: 100dvh;
    overflow: hidden; scroll-snap-align: start;
    display: flex; flex-direction: column; position: relative;
}
:root {
    --title-size: clamp(1.5rem, 5vw, 4rem);
    --body-size: clamp(0.75rem, 1.5vw, 1.125rem);
    --small-size: clamp(0.65rem, 1vw, 0.875rem);
    --slide-padding: clamp(1rem, 4vw, 4rem);
    --content-gap: clamp(0.5rem, 2vw, 2rem);
    --element-gap: clamp(0.25rem, 1vw, 1rem);
}
@media (max-height: 700px) { :root { --slide-padding: clamp(0.75rem, 3vw, 2rem); --title-size: clamp(1.25rem, 4.5vw, 2.5rem); } }
@media (max-height: 600px) { :root { --slide-padding: clamp(0.5rem, 2.5vw, 1.5rem); --title-size: clamp(1.1rem, 4vw, 2rem); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.2s !important; } }

/* === VINTAGE EDITORIAL THEME === */
:root {
    --bg-cream: #f5f3ee;
    --text-primary: #1a1a1a;
    --text-secondary: #555;
    --accent-warm: #e8d4c0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Work Sans', sans-serif; background: var(--bg-cream); color: var(--text-primary); }

/* Centered content */
.content {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    max-width: min(80vw, 700px);
    width: 100%;
}

/* Geometric decorations */
.deco-circle {
    position: absolute;
    width: clamp(80px, 15vw, 150px);
    height: clamp(80px, 15vw, 150px);
    border: 2px solid var(--accent-warm);
    border-radius: 50%;
    top: 10%;
    right: 10%;
    opacity: 0;
    animation: fadeIn 1s ease 0.5s forwards;
}
.deco-line {
    position: absolute;
    width: clamp(60px, 12vw, 120px);
    height: 2px;
    background: var(--accent-warm);
    bottom: 15%;
    left: 8%;
    transform: rotate(-30deg);
    transform-origin: left center;
    opacity: 0;
    animation: fadeIn 0.8s ease 0.7s forwards;
}
.deco-dot {
    position: absolute;
    width: 8px; height: 8px;
    background: var(--accent-warm);
    border-radius: 50%;
    bottom: 20%;
    right: 15%;
    opacity: 0;
    animation: fadeIn 0.6s ease 0.9s forwards;
}
@keyframes fadeIn { to { opacity: 1; } }

/* Issue label */
.issue-label {
    font-size: var(--small-size);
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.25em;
    margin-bottom: var(--content-gap);
    opacity: 0;
    animation: fadeUp 0.6s ease 0.2s forwards;
}
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(3.5rem, 10vw, 8rem);
    font-weight: 900;
    line-height: 0.9;
    letter-spacing: -0.03em;
    margin-bottom: var(--content-gap);
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
}
h1 span {
    display: block;
    color: var(--text-secondary);
    font-size: 0.45em;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 0.1em;
}

/* Tagline */
.tagline {
    font-size: clamp(0.9rem, 2vw, 1.25rem);
    color: var(--text-secondary);
    line-height: 1.6;
    max-width: 45ch;
    margin: 0 auto var(--content-gap);
    font-weight: 400;
    opacity: 0;
    transform: translateY(15px);
    animation: fadeUp 0.7s ease 0.5s forwards;
}

/* CTA box */
.cta-box {
    display: inline-block;
    border: 2px solid var(--text-primary);
    padding: 0.7em 1.8em;
    font-size: var(--small-size);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.7s forwards;
}
</style>
</head>
<body>

<div class="slide">
    <div class="deco-circle"></div>
    <div class="deco-line"></div>
    <div class="deco-dot"></div>

    <div class="content">
        <div class="issue-label">S01 · 核心闭环 · Agent Loop</div>
        <h1><span>Agent Loop</span>核心闭环</h1>
        <p class="tagline">把"模型 + 工具"连接成一个能持续推进任务的主循环。最小实现，130 LOC</p>
        <div class="cta-box">learn.shareai.run</div>
    </div>
</div>

</body>
</html>
