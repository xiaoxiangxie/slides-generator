<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split Pastel Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Outfit:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f5e6dc;
  font-family: 'Outfit', sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6%;
  color: #1a1a1a;
  overflow: hidden;
}

.split { display:flex; width:100%; height:100%; border-radius:6px; overflow:hidden; box-shadow:0 16px 48px rgba(0,0,0,0.15); }
.peach { width:50%; background:#f5e6dc; padding:8%; display:flex; flex-direction:column; justify-content:center; }
.lav { width:50%; background:#e4dff0; padding:8%; display:flex; flex-direction:column; justify-content:center; position:relative; }
.lav::after { content:''; position:absolute; inset:0; background-image:linear-gradient(rgba(100,80,150,0.06) 1px, transparent 1px),linear-gradient(90deg, rgba(100,80,150,0.06) 1px, transparent 1px); background-size:10px 10px; }
.peach-label { font-size:clamp(0.35rem,0.85vw,0.55rem); font-weight:700; color:#8a6a50; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:4%; opacity:0; animation:slideR 0.6s ease 0.2s forwards; }
.peach-title { font-family:'Outfit',sans-serif; font-size:clamp(1.4rem,4vw,2.8rem); font-weight:800; color:#1a1a1a; line-height:0.95; opacity:0; animation:slideR 0.7s ease 0.3s forwards; }
.peach-title span { color:#9b6ea0; display:block; }
.lav-badge { font-size:clamp(0.3rem,0.75vw,0.48rem); font-weight:700; padding:2px 8px; border-radius:20px; display:inline-block; margin-bottom:3%; opacity:0; animation:fadeIn 0.5s ease 0.4s forwards; }
.lav-badge-m { background:#c8f0d8; color:#3a6a4a; }
.lav-badge-y { background:#f0f0c8; color:#6a6a3a; }
.lav-badge-p { background:#f0d4e0; color:#7a4a5a; }
.lav-desc { font-size:clamp(0.38rem,0.9vw,0.6rem); color:#666; line-height:1.5; opacity:0; animation:fadeIn 0.6s ease 0.5s forwards; }
@keyframes slideR { to { opacity:1; transform:translateX(0); } }
@keyframes fadeIn { to { opacity:1; } }

</style>
</head>
<body>
<div class="split">
  <div class="peach">
    <div class="peach-label">S01 · 核心闭环</div>
    <div class="peach-title">Agent<br><span>Loop</span></div>
  </div>
  <div class="lav">
    <span class="lav-badge lav-badge-m">130 LOC</span>
    <span class="lav-badge lav-badge-y">最小闭环</span>
    <span class="lav-badge lav-badge-p">1 个工具</span>
    <p class="lav-desc">把"模型 + 工具"连接成一个能持续推进任务的主循环</p>
  </div>
</div>
</body>
</html>
