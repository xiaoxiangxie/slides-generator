<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper & Ink Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700;800&family=Source+Serif+4:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #faf9f7;
  font-family: 'Source Serif 4', sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6%;
  color: #1a1a1a;
  overflow: hidden;
}

.main { width:100%; height:100%; position:relative; background:#faf9f7; }
.top-rule { position:absolute; top:10%; left:8%; right:8%; display:flex; align-items:center; gap:8px; }
.tr-label { font-size:clamp(0.3rem,0.75vw,0.48rem); font-weight:500; color:#6b6560; text-transform:uppercase; letter-spacing:0.15em; white-space:nowrap; }
.tr-line { flex:1; height:1px; background:linear-gradient(90deg, #c41e3a, transparent); }
.content { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; width:85%; }
h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(1.6rem,4.5vw,3rem); font-weight:400; line-height:1.1; margin-bottom:5%; opacity:0; animation:fadeUp 0.8s ease 0.2s forwards; }
h1 em { font-style:italic; color:#c41e3a; }
.desc { font-size:clamp(0.38rem,0.9vw,0.6rem); color:#6b6560; line-height:1.7; max-width:40ch; margin:0 auto; opacity:0; animation:fadeUp 0.7s ease 0.4s forwards; }
.pull { position:absolute; top:10%; right:8%; max-width:18ch; text-align:right; }
blockquote { font-family:'Cormorant Garamond',serif; font-size:clamp(0.35rem,0.85vw,0.55rem); font-style:italic; color:#6b6560; border-right:2px solid #c41e3a; padding-right:8px; line-height:1.5; }
cite { display:block; font-size:clamp(0.28rem,0.7vw,0.45rem); font-style:normal; color:#c41e3a; margin-top:3px; }
.bot-rule { position:absolute; bottom:10%; left:8%; right:8%; display:flex; align-items:center; gap:8px; }
.br-line { flex:1; height:1px; background:linear-gradient(90deg, transparent, #c41e3a); }
.br-label { font-size:clamp(0.3rem,0.75vw,0.48rem); font-weight:500; color:#6b6560; letter-spacing:0.08em; }
@keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

</style>
</head>
<body>
<div class="main">
  <div class="top-rule">
    <span class="tr-label">S01 · 核心闭环</span>
    <div class="tr-line"></div>
  </div>
  <div class="content">
    <h1>Agent <em>Loop</em></h1>
    <p class="desc">把"模型 + 工具"连接成一个能持续推进任务的主循环</p>
  </div>
  <div class="pull">
    <blockquote>"真正的 agent 起点，是把真实工具结果重新喂回模型"</blockquote>
    <cite>— 核心原则</cite>
  </div>
  <div class="bot-rule">
    <div class="br-line"></div>
    <span class="br-label">learn.shareai.run/zh/s01</span>
  </div>
</div>
</body>
</html>
