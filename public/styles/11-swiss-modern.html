<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swiss Modern Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black:wght@400;700;800&family=Nunito:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #ffffff;
  font-family: 'Nunito', sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6%;
  color: #1a1a1a;
  overflow: hidden;
}

.main { width:100%; height:100%; position:relative; background:#fff; }
.top-bar { position:absolute; top:0; left:0; right:0; height:5px; background:#ff3300; }
.bgnum { position:absolute; top:50%; right:4%; transform:translateY(-50%); font-family:'Archivo Black',sans-serif; font-size:clamp(5rem,15vw,11rem); font-weight:900; color:rgba(0,0,0,0.04); line-height:1; user-select:none; }
.content { position:absolute; top:50%; left:8%; transform:translateY(-50%); }
.tag { font-size:clamp(0.35rem,0.85vw,0.55rem); font-weight:600; text-transform:uppercase; letter-spacing:0.15em; color:#ff3300; margin-bottom:4%; }
h1 { font-family:'Archivo Black',sans-serif; font-size:clamp(1.6rem,5vw,3.8rem); font-weight:900; line-height:0.9; letter-spacing:-0.02em; text-transform:uppercase; color:#1a1a1a; }
.sub { font-size:clamp(0.38rem,0.9vw,0.6rem); color:#444; margin-top:4%; line-height:1.5; }
.bottom { position:absolute; bottom:8%; left:8%; right:8%; display:flex; justify-content:space-between; align-items:flex-end; }
.stat-n { font-family:'Archivo Black',sans-serif; font-size:clamp(0.9rem,2.2vw,1.4rem); color:#1a1a1a; }
.stat-l { font-size:clamp(0.3rem,0.75vw,0.48rem); font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:#aaa; }
.cta { font-size:clamp(0.3rem,0.75vw,0.48rem); font-weight:600; text-transform:uppercase; letter-spacing:0.08em; padding:4px 10px; border:1.5px solid #1a1a1a; color:#1a1a1a; }

</style>
</head>
<body>
<div class="main">
  <div class="top-bar"></div>
  <div class="bgnum">11</div>
  <div class="content">
    <div class="tag">S01 · 核心闭环</div>
    <h1>AGENT<br>LOOP</h1>
    <p class="sub">130行代码 · 最小闭环</p>
  </div>
  <div class="bottom">
    <div><div class="stat-n">130</div><div class="stat-l">代码行数</div></div>
    <div><div class="stat-n">1</div><div class="stat-l">工具</div></div>
    <div><div class="stat-n">∞</div><div class="stat-l">循环</div></div>
    <div class="cta">learn.shareai.run</div>
  </div>
</div>
</body>
</html>
