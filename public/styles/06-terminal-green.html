<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal Green Preview</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d1117;
  font-family: 'JetBrains Mono', sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6%;
  color: #39d353;
  overflow: hidden;
}

.term { width:90%; background:#161b22; border-radius:6px; border:1px solid rgba(255,255,255,0.06); box-shadow:0 16px 48px rgba(0,0,0,0.5); overflow:hidden; }
.bar { display:flex; align-items:center; gap:6px; padding:8px 12px; background:#1c2128; border-bottom:1px solid rgba(255,255,255,0.04); }
.dots { display:flex; gap:4px; }
.dot { width:8px; height:8px; border-radius:50%; }
.dot-r { background:#ff5f56; }
.dot-y { background:#ffbd2e; }
.dot-g { background:#27c93f; }
.title-t { flex:1; text-align:center; font-size:clamp(0.35rem,0.85vw,0.55rem); color:#7d8590; font-family:'JetBrains Mono',monospace; }
.body { padding:12px 14px; display:flex; flex-direction:column; gap:4px; }
.line { display:flex; gap:8px; align-items:flex-start; }
.prompt { color:#39d353; font-weight:700; font-size:clamp(0.38rem,0.9vw,0.58rem); font-family:'JetBrains Mono',monospace; }
.cmd { font-size:clamp(0.38rem,0.9vw,0.58rem); color:#e6edf3; font-family:'JetBrains Mono',monospace; }
.out { font-size:clamp(0.35rem,0.85vw,0.55rem); color:#7d8590; font-family:'JetBrains Mono',monospace; }
.out .acc { color:#79c0ff; }
.out .c { color:#8b949e; font-style:italic; }
.cur { display:inline-block; width:6px; height:10px; background:#39d353; vertical-align:text-bottom; animation:blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

</style>
</head>
<body>
<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;">
<div class="term">
  <div class="bar">
    <div class="dots"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div></div>
    <div class="title-t">agent_loop.py — S01</div>
  </div>
  <div class="body">
    <div class="line"><span class="prompt">$</span> <span class="cmd">python agent_loop.py</span></div>
    <div class="line"><span class="out"><span class="acc">→</span> Initializing agent loop...</span></div>
    <div class="line"><span class="out"><span class="acc">→</span> State: messages=[], turn=1</span></div>
    <div class="line"><span class="out">"真正的 agent 起点..."</span></div>
    <div class="line"><span class="prompt">$</span> <span class="cur"></span></div>
  </div>
</div>
</div>
</body>
</html>
