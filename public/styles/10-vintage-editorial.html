<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vintage Editorial Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;800&family=Work+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f5f3ee;
  font-family: 'Work Sans', sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6%;
  color: #1a1a1a;
  overflow: hidden;
}

.main { width:100%; height:100%; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
.circle { position:absolute; width:70px; height:70px; border:2px solid #e8d4c0; border-radius:50%; top:8%; right:8%; }
.line { position:absolute; width:40px; height:2px; background:#e8d4c0; bottom:15%; left:8%; transform:rotate(-30deg); }
.dot { position:absolute; width:7px; height:7px; background:#e8d4c0; border-radius:50%; bottom:20%; right:10%; }
.issue { font-size:clamp(0.32rem,0.8vw,0.5rem); color:#888; text-transform:uppercase; letter-spacing:0.15em; margin-bottom:4%; opacity:0; animation:fadeIn 0.5s ease 0.2s forwards; }
h1 { font-family:'Fraunces',serif; font-size:clamp(1.4rem,4vw,2.8rem); font-weight:900; line-height:0.95; letter-spacing:-0.02em; color:#1a1a1a; margin-bottom:6%; opacity:0; animation:fadeUp 0.8s ease 0.3s forwards; }
h1 span { display:block; font-size:0.4em; color:#888; font-weight:700; letter-spacing:0.1em; }
.tagline { font-size:clamp(0.38rem,0.9vw,0.6rem); color:#888; line-height:1.6; max-width:35ch; margin:0 auto 6%; opacity:0; animation:fadeUp 0.7s ease 0.4s forwards; }
.cta { display:inline-block; border:1.5px solid #1a1a1a; padding:4px 12px; font-size:clamp(0.32rem,0.8vw,0.5rem); font-weight:500; text-transform:uppercase; letter-spacing:0.1em; color:#1a1a1a; opacity:0; animation:fadeIn 0.6s ease 0.5s forwards; }
@keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { to { opacity:1; } }

</style>
</head>
<body>
<div class="main">
  <div class="circle"></div>
  <div class="line"></div>
  <div class="dot"></div>
  <div class="issue">S01 · 核心闭环</div>
  <h1><span>Agent Loop</span>核心闭环</h1>
  <p class="tagline">把"模型 + 工具"连接成一个能持续推进任务的主循环</p>
  <div class="cta">learn.shareai.run</div>
</div>
</body>
</html>
