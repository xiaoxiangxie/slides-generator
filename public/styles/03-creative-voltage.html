<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Voltage Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  font-family: 'Space Mono', sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6%;
  color: #ffffff;
  overflow: hidden;
}

.split { display:flex; width:100%; height:100%; border-radius:6px; overflow:hidden; box-shadow:0 16px 48px rgba(0,0,0,0.5); }
.left { width:45%; background:#0066ff; position:relative; display:flex; flex-direction:column; justify-content:center; padding:8%; }
.left::after { content:''; position:absolute; inset:0; background-image:radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px); background-size:6px 6px; }
.badge { font-size:clamp(0.35rem,0.85vw,0.55rem); font-weight:700; background:#d4ff00; color:#1a1a2e; padding:2px 6px; display:inline-block; margin-bottom:6%; }
.big-t { font-family:'Syne',sans-serif; font-size:clamp(1.2rem,3.5vw,2.2rem); font-weight:800; color:#fff; line-height:1; }
.big-t span { color:#d4ff00; }
.right { width:55%; padding:8%; display:flex; flex-direction:column; justify-content:center; gap:6%; }
.tag { font-size:clamp(0.38rem,0.9vw,0.58rem); color:rgba(255,255,255,0.4); font-family:'Space Mono',monospace; }
.desc { font-size:clamp(0.42rem,1.1vw,0.68rem); color:rgba(255,255,255,0.7); line-height:1.5; }
.desc strong { color:#d4ff00; }
@keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

</style>
</head>
<body>
<div class="split">
  <div class="left">
    <div class="badge">S01 · 核心闭环</div>
    <div class="big-t">Agent<br><span>Loop</span></div>
  </div>
  <div class="right">
    <div class="tag">// 核心概念</div>
    <p class="desc">把"<strong>模型 + 工具</strong>"连接成一个<strong>能持续推进任务</strong>的主循环</p>
  </div>
</div>
</body>
</html>
