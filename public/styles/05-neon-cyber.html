<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Cyber Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Manrope:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0f1c;
  font-family: 'Manrope', sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6%;
  color: #e0e8ff;
  overflow: hidden;
}

.main { width:100%; height:100%; position:relative; display:flex; flex-direction:column; justify-content:center; padding:8%; }
.main::before { content:''; position:absolute; inset:0; background-image:linear-gradient(rgba(0,255,204,0.04) 1px, transparent 1px),linear-gradient(90deg, rgba(0,255,204,0.04) 1px, transparent 1px); background-size:25px 25px; }
.orb { position:absolute; top:-40%; left:10%; width:250px; height:250px; border-radius:50%; background:radial-gradient(ellipse, rgba(0,255,204,0.12) 0%, rgba(255,0,170,0.06) 50%, transparent 70%); filter:blur(25px); }
.badge { font-size:clamp(0.35rem,0.85vw,0.55rem); font-weight:700; color:#00ffcc; text-transform:uppercase; letter-spacing:0.1em; display:flex; align-items:center; gap:8px; margin-bottom:4%; }
.badge::before { content:''; width:20px; height:2px; background:#00ffcc; box-shadow:0 0 6px #00ffcc; }
h1 { font-family:'Manrope',sans-serif; font-size:clamp(1.6rem,5vw,3.5rem); font-weight:800; line-height:0.95; margin-bottom:8%; opacity:0; animation:fadeIn 0.8s ease 0.2s forwards; }
h1 .cyan { color:#00ffcc; text-shadow:0 0 20px rgba(0,255,204,0.5); }
h1 .mag { color:#ff00aa; text-shadow:0 0 20px rgba(255,0,170,0.4); }
.stats { display:flex; gap:12%; }
.stat-n { font-size:clamp(1rem,2.5vw,1.6rem); font-weight:800; color:#00ffcc; text-shadow:0 0 12px rgba(0,255,204,0.3); }
.stat-l { font-size:clamp(0.32rem,0.8vw,0.5rem); color:rgba(224,232,255,0.4); text-transform:uppercase; letter-spacing:0.08em; }
@keyframes fadeIn { to { opacity:1; } }

</style>
</head>
<body>
<div class="main">
  <div class="orb"></div>
  <div class="badge">S01 · 核心闭环</div>
  <h1><span class="cyan">Agent</span><br><span class="mag">Loop</span></h1>
  <div class="stats">
    <div><div class="stat-n">130</div><div class="stat-l">代码行数</div></div>
    <div><div class="stat-n">1</div><div class="stat-l">工具</div></div>
    <div><div class="stat-n">∞</div><div class="stat-l">循环</div></div>
  </div>
</div>
</body>
</html>
